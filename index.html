<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Workout B</title>
<style>
  :root{
    --bg:#0a0e14;
    --bg2:#10161f;
    --card:#161d28;
    --line:#26303d;
    --text:#f3f6fa;
    --muted:#9fb0c0;
    --accent:#36d399;       /* posterior-chain green */
    --accent-soft:#36d39922;
    --cue:#f6c453;          /* amber highlight */
    --cue-soft:#f6c4531a;
    --yt:#ff3b30;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --bar-h:48px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}

  /* ---------- persistent top bar (always-visible slide number/title) ---------- */
  #topbar{position:fixed;top:0;left:0;right:0;height:calc(var(--bar-h) + var(--safe-t));
    padding-top:var(--safe-t);z-index:40;display:flex;align-items:center;gap:10px;
    padding-left:16px;padding-right:16px;
    background:linear-gradient(180deg,rgba(10,14,20,.96),rgba(10,14,20,.78) 70%,rgba(10,14,20,0));
    backdrop-filter:blur(6px)}
  #topbar .brand{font-weight:800;letter-spacing:.14em;font-size:12px;color:var(--accent);text-transform:uppercase}
  #topbar .title{flex:1;text-align:center;font-weight:600;font-size:14px;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #topbar .count{font-variant-numeric:tabular-nums;font-weight:700;font-size:13px;color:var(--muted)}

  /* ---------- horizontal swipe track ---------- */
  #track{display:flex;height:100dvh;width:100vw;max-width:100vw;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;scroll-behavior:smooth;
    -ms-overflow-style:none;scrollbar-width:none}
  #track::-webkit-scrollbar{display:none}

  .slide{flex:0 0 100vw;width:100vw;min-width:0;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
    overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .slide::-webkit-scrollbar{display:none}
  .inner{min-height:100dvh;width:100%;max-width:540px;margin:0 auto;
    display:flex;flex-direction:column;gap:12px;
    padding:calc(var(--bar-h) + var(--safe-t) + 12px) 18px calc(82px + var(--safe-b)) 18px}
  .inner > *{min-width:0;max-width:100%}

  /* ---------- intro / finish slides ---------- */
  .center{justify-content:center;text-align:center;gap:18px}
  .big-title{font-size:clamp(40px,12vw,68px);font-weight:850;line-height:1.02;margin:0;
    letter-spacing:-.02em;overflow-wrap:break-word}
  .subtitle{font-size:clamp(16px,4.6vw,20px);color:var(--text);font-weight:600;margin:0;
    overflow-wrap:break-word}
  .swipe{font-size:15px;color:var(--accent);font-weight:700;letter-spacing:.04em;
    animation:nudge 1.6s ease-in-out infinite}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
  .note{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:12px;padding:14px 16px;font-size:14.5px;line-height:1.5;color:var(--muted);
    text-align:left;overflow-wrap:break-word}
  .note b{color:var(--text)}
  .addons{display:flex;flex-direction:column;gap:12px;text-align:left;width:100%}

  /* ---------- exercise header ---------- */
  .ex-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .ex-num{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;
    width:34px;height:34px;border-radius:10px;background:var(--accent);color:#04130c;
    font-weight:850;font-size:18px}
  .ex-head h1{margin:0;font-size:clamp(22px,6.4vw,30px);font-weight:800;line-height:1.05;letter-spacing:-.01em}
  .ex-head .ex-sub{color:var(--muted);font-size:14px;font-weight:600}

  /* ---------- demo images (white card so line-art + photos read on dark) ---------- */
  .demo{display:flex;gap:8px;background:#fff;border-radius:14px;padding:8px;
    border:1px solid var(--line)}
  .demo figure{flex:1 1 0;margin:0;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
  .demo img{width:100%;height:26vh;max-height:240px;object-fit:contain;display:block}
  .demo figcaption{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:#5b6b7a}

  /* ---------- muscle pills ---------- */
  .muscles{display:flex;flex-wrap:wrap;gap:7px}
  .pill{background:var(--accent-soft);color:var(--accent);border:1px solid #36d39944;
    border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:700}

  /* ---------- how to / cues ---------- */
  h2.sec{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    margin:2px 0 0;font-weight:800}
  ol.steps{margin:0;padding-left:0;list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:7px}
  ol.steps li{counter-increment:s;position:relative;padding-left:30px;font-size:14.5px;line-height:1.42;color:var(--text)}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:0;
    width:21px;height:21px;border-radius:6px;background:var(--bg2);border:1px solid var(--line);
    color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .cues{background:var(--cue-soft);border:1px solid #f6c45340;border-left:3px solid var(--cue);
    border-radius:12px;padding:12px 14px}
  .cues h2.sec{color:var(--cue)}
  .cues ul{margin:8px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:6px}
  .cues li{font-size:14px;line-height:1.42;color:var(--text)}

  /* ---------- how much ---------- */
  .howmuch{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .stat{flex:1 1 30%;min-width:96px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px}
  .stat .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .stat .v{font-size:15px;font-weight:800;margin-top:3px;line-height:1.2}

  /* ---------- watch button ---------- */
  .watch{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:10px;
    text-decoration:none;background:var(--yt);color:#fff;font-weight:800;font-size:17px;
    padding:16px;border-radius:14px;box-shadow:0 6px 20px rgba(255,59,48,.28)}
  .watch:active{transform:translateY(1px)}
  .watch .play{font-size:15px}

  /* ---------- bottom nav bar (arrows + dots, never overlaps content) ---------- */
  #navbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:12px 16px calc(12px + var(--safe-b));
    background:linear-gradient(0deg,rgba(10,14,20,.97) 55%,rgba(10,14,20,0))}
  .arrow{flex:0 0 auto;width:64px;height:46px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:13px;background:rgba(22,29,40,.85);
    color:var(--text);font-size:26px;font-weight:700;cursor:pointer;padding:0;line-height:1}
  .arrow:active{background:rgba(54,211,153,.3)}
  .arrow[disabled]{opacity:.3;pointer-events:none}
  #dots{flex:1;display:flex;justify-content:center;align-items:center;gap:8px}
  #dots button{width:8px;height:8px;border-radius:50%;border:none;padding:0;
    background:#3a4756;cursor:pointer;transition:width .2s,background .2s}
  #dots button.active{width:22px;border-radius:5px;background:var(--accent)}

  /* ---------- progress card ---------- */
  .progress{margin-top:4px;background:linear-gradient(180deg,#141c28,#0f1621);
    border:1px solid #2c3a4b;border-radius:14px;padding:13px 14px;
    display:flex;flex-direction:column;gap:11px}
  .pg-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .pg-name{font-size:14px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .pg-name .lbl{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);font-weight:800;margin-bottom:3px}
  .trend{display:inline-flex;align-items:center;background:var(--accent-soft);color:var(--accent);
    border:1px solid #36d39955;border-radius:999px;padding:4px 10px;font-size:12.5px;
    font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
  .pg-chart{display:flex;align-items:flex-end;gap:8px;height:78px}
  .pg-bar{flex:1 1 0;min-width:0;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;gap:5px}
  .pg-bar .bw{font-size:11px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
  .pg-bar.next .bw{color:var(--accent)}
  .pg-bar .bar{width:100%;max-width:38px;border-radius:6px 6px 0 0;min-height:6px;
    background:linear-gradient(180deg,#54697f,#3c4d61)}
  .pg-bar.next .bar{background:var(--accent-soft);border:2px dashed var(--accent);border-bottom:none}
  .pg-cmp{display:flex;align-items:stretch;gap:9px}
  .pg-box{flex:1 1 0;min-width:0;background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
  .pg-box.next{border:2px solid var(--accent);background:var(--accent-soft)}
  .pg-box .bl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:800}
  .pg-box.next .bl{color:var(--accent)}
  .pg-box .bw{font-size:22px;font-weight:850;line-height:1.03;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;overflow-wrap:break-word}
  .pg-box .bw.txt{font-size:14.5px;font-weight:800;line-height:1.2}
  .pg-box .br{font-size:12px;color:var(--muted);font-weight:600}
  .pg-arrow{flex:0 0 auto;align-self:center;color:var(--muted);font-size:19px;font-weight:800}
  .pg-note{display:flex;gap:7px;align-items:flex-start;font-size:13px;line-height:1.42;color:var(--text)}
  .pg-note .ic{flex:0 0 auto;font-size:14px}

  @media (min-width:560px){.demo img{height:30vh}}
</style>
</head>
<body>
  <header id="topbar">
    <span class="brand">Workout&nbsp;B</span>
    <span class="title" id="bar-title">Intro</span>
    <span class="count" id="bar-count">1&thinsp;/&thinsp;7</span>
  </header>

  <main id="track" aria-label="Workout B slideshow"></main>

  <nav id="navbar" aria-label="Slide navigation">
    <button class="arrow prev" id="prev" aria-label="Previous slide">&#8249;</button>
    <div id="dots"></div>
    <button class="arrow next" id="next" aria-label="Next slide">&#8250;</button>
  </nav>

<script>
(function(){
  "use strict";

  // ---------- content model ----------
  var EXERCISES = [
    {
      name:"Bulgarian Split Squat", sub:"with dumbbells",
      imgs:[["images/splitsquat-down.png","Bottom"],["images/splitsquat-up.png","Top"]],
      muscles:["quads","glutes","adductors","balance / core"],
      steps:[
        "Stand ~60–70 cm in front of a bench, a dumbbell in each hand at your sides (palms facing you).",
        "Place the top of one foot back on the bench. Front foot far enough forward that your knee stays over your mid-foot.",
        "Lower straight down until your front thigh is about parallel to the floor; torso leans slightly forward, back stays long.",
        "Drive up through your front heel. Finish all reps on one leg, then switch."
      ],
      cues:[
        "First 1–2 sessions: bodyweight only — this move is all about balance. Groove the pattern before loading.",
        "If you wobble, lightly touch a wall or rack with one finger — don't grip it.",
        "Add dumbbells (start 5–7.5 kg/hand) once you can do 3×10 per leg cleanly; build toward ~10–15 kg/hand. The limiter is balance and the stretch, not raw strength."
      ],
      how:{sets:"3 × 8–10",setsk:"per leg",rest:"~90 sec",weight:"5 kg / hand"},
      yt:"https://www.youtube.com/watch?v=uODWo4YqbT8"
    },
    {
      name:"Overhead Press", sub:"dumbbells, standing",
      imgs:[["images/ohp-start.png","Shoulders"],["images/ohp-finish.png","Overhead"]],
      muscles:["shoulders","triceps","upper chest","core"],
      steps:[
        "Stand tall, feet shoulder-width, a dumbbell at each shoulder, palms facing forward.",
        "Brace your abs and squeeze your glutes so your lower back doesn't arch.",
        "Press both dumbbells straight up until your arms are fully extended overhead — don't lean back.",
        "Lower under control back to your shoulders."
      ],
      cues:[
        "Dumbbells (not barbell) on purpose: kinder to the shoulder joint and they force more core bracing.",
        "The brace is the whole game — if your lower back arches, you've lost it. Start lighter.",
        "Start around 10–12.5 kg per hand for 6–9 reps."
      ],
      how:{sets:"3 × 6–9",setsk:"reps",rest:"~2 min",weight:"10 kg / hand"},
      yt:"https://www.youtube.com/watch?v=qEwKCR5JCog"
    },
    {
      name:"Seated Cable Row", sub:"neutral close grip",
      imgs:[["images/row-start.png","Stretch"],["images/row-finish.png","Squeeze"]],
      muscles:["mid-back","lats","rear delts","biceps"],
      steps:[
        "Use the V-shaped close handle (neutral grip, palms facing). Feet on the plates, slight knee bend, sit tall.",
        "Pull the handle to your lower ribs / belly button, leading with your elbows close to your body.",
        "Squeeze your shoulder blades together at the end, then return under control without slouching forward."
      ],
      cues:[
        "Pull to your lower ribs, not your chest.",
        "Keep your torso roughly upright — don't heave backward; let your back do the work, not momentum.",
        "Start around 30 kg."
      ],
      how:{sets:"3 × 8–10",setsk:"reps",rest:"~90 sec",weight:"~30 kg to start"},
      yt:"https://www.youtube.com/watch?v=sP_4vybjVJs"
    },
    {
      name:"Seated Leg Curl", sub:"hamstrings",
      imgs:[["images/legcurl-start.png","Legs out"],["images/legcurl-finish.png","Curled"]],
      muscles:["hamstrings"],
      steps:[
        "Sit with your back against the pad, legs out over the roller, the roller resting just above your heels / Achilles.",
        "Lock the thigh pad down snug.",
        "Curl your heels down and under toward your butt as far as you can; squeeze.",
        "Return slowly under control — don't let the weight slam back."
      ],
      cues:[
        "This replaced heavy Romanian deadlifts on purpose: it grows the hamstring in a stretched position with almost no load on your spine, and helps protect against the hamstring strains runners get.",
        "The slow lowering (eccentric) is where the benefit is — control it."
      ],
      how:{sets:"3 × 10–12",setsk:"reps",rest:"~90 sec",weight:"~45 kg"},
      yt:"https://www.youtube.com/watch?v=ELOCsoDSmrg"
    },
    {
      name:"Ab Wheel Rollout", sub:"build up the stages — don't rush",
      imgs:[["images/abwheel-start.svg","Kneeling"],["images/abwheel-finish.svg","Rolled out"]],
      muscles:["abs (anti-extension)","obliques"],
      steps:[
        "Wall rollout (standing): face a wall, roll the wheel up the wall and back. Step your feet back from the wall to make it harder.",
        "Kneeling partial: from your knees, roll out only as far as you can keep your lower back from sagging — even 30 cm is fine.",
        "Kneeling full rollout: extend almost flat, then pull back. This is the real target (a few weeks).",
        "Long-term, optional: standing rollout — advanced, no rush."
      ],
      cues:[
        "Brace your abs and tuck your pelvis slightly (round the lower back — never let it arch).",
        "If you feel it in your lower back instead of your abs, you've rolled out too far — shorten the range.",
        "No wheel? A barbell with plates on the floor works identically."
      ],
      how:{sets:"3 × 8–12",setsk:"at your stage",rest:"~90 sec",weight:"Whatever stage you're on"},
      yt:"https://www.youtube.com/watch?v=ikkOq5mHaho"
    }
  ];

  // ---------- progress log (append one {date,weight,reps} to `history` each session; update `next`) ----------
  // weight:null = bodyweight — set `weightLabel` for display; bar chart renders only from numeric `weight`.
  var PROGRESS = [
    { // Dumbbell Bulgarian Split Squat
      history:[{date:"24 Jun", weight:null, weightLabel:"BW", reps:"10 / leg"}],
      next:{weight:null, weightLabel:"5 kg / hand", repsLabel:"8–10 / leg", note:"Clean at bodyweight — add 5 kg dumbbells."}
    },
    { // Dumbbell Overhead Press
      history:[{date:"24 Jun", weight:10, reps:"8, 8, 4"}],
      next:{weight:10, repsLabel:"aim 8, 8, 8", note:"Keep 10 kg/hand and build that last set to 8."}
    },
    { // Seated Cable Row
      history:[{date:"24 Jun", weight:30, reps:"8, 8, 8"}],
      next:{weight:30, repsLabel:"8–10", note:"Hold 30 kg for all 3 sets, then build reps to 10."}
    },
    { // Seated Leg Curl
      history:[{date:"24 Jun", weight:45, reps:"8, 8, 8"}],
      next:{weight:45, repsLabel:"10–12 slow", note:"57.5 kg was too heavy — ~45 kg with a slow lower for 10–12."}
    },
    { // Ab Wheel Rollout
      history:[{date:"24 Jun", weight:null, weightLabel:"BW wall", reps:"7, 8, 8"}],
      next:{weight:null, weightLabel:"BW wall", repsLabel:"8–12", note:"Step your feet back a little from the wall."}
    }
  ];

  var track = document.getElementById('track');

  function el(tag, cls, html){var n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n;}

  // ---------- progress card ----------
  function buildProgress(ex, p){
    if(!p) return null;
    function disp(w,label){ return (w!=null) ? (w+' kg') : (label||'BW'); }

    var wrap = el('div','progress');
    var numHist = p.history.filter(function(h){ return h.weight!=null; });
    var last = p.history[p.history.length-1];
    var lastNumW = null;
    for(var i=p.history.length-1;i>=0;i--){ if(p.history[i].weight!=null){ lastNumW=p.history[i].weight; break; } }

    // header + trend badge (only when next target is a higher numeric weight)
    var head = el('div','pg-head');
    head.appendChild(el('div','pg-name','<span class="lbl">Progress</span>'+ex.name));
    if(p.next.weight!=null && lastNumW!=null && p.next.weight>lastNumW){
      var delta = Math.round((p.next.weight-lastNumW)*10)/10;
      head.appendChild(el('span','trend','&#9650;&nbsp;+'+delta+'&nbsp;kg'));
    }
    wrap.appendChild(head);

    // weight trend bar chart — only with 2+ logged numeric sessions; final bar = next target (accent, dashed)
    if(numHist.length>=2){
      var series = numHist.map(function(h){ return {w:h.weight,next:false}; });
      if(p.next.weight!=null) series.push({w:p.next.weight,next:true});
      var maxW = Math.max.apply(null, series.map(function(s){ return s.w; }));
      var chart = el('div','pg-chart');
      series.forEach(function(s){
        var col = el('div','pg-bar'+(s.next?' next':''));
        col.appendChild(el('div','bw',s.w));
        var bar = el('div','bar');
        bar.style.height = Math.round(24+76*(s.w/maxW))+'%';
        col.appendChild(bar);
        chart.appendChild(col);
      });
      wrap.appendChild(chart);
    }

    // last -> next comparison
    var cmp = el('div','pg-cmp');
    cmp.appendChild(el('div','pg-box',
      '<div class="bl">'+last.date+'</div>'+
      '<div class="bw'+(last.weight==null?' txt':'')+'">'+disp(last.weight,last.weightLabel)+'</div>'+
      '<div class="br">&times;&nbsp;'+last.reps+'</div>'));
    cmp.appendChild(el('div','pg-arrow','&rarr;'));
    cmp.appendChild(el('div','pg-box next',
      '<div class="bl">Next&nbsp;&#9650;</div>'+
      '<div class="bw'+(p.next.weight==null?' txt':'')+'">'+disp(p.next.weight,p.next.weightLabel)+'</div>'+
      '<div class="br">'+p.next.repsLabel+'</div>'));
    wrap.appendChild(cmp);

    // coaching note
    if(p.next.note){
      wrap.appendChild(el('div','pg-note','<span class="ic">&#128161;</span><span>'+p.next.note+'</span>'));
    }
    return wrap;
  }

  // ---- intro slide ----
  var intro = el('section','slide');
  intro.dataset.title = "Intro";
  intro.appendChild((function(){
    var i = el('div','inner center');
    i.appendChild(el('h1','big-title','Workout&nbsp;B'));
    i.appendChild(el('p','subtitle','Pull + posterior chain + core &mdash; 2&times;&thinsp;/&thinsp;week'));
    i.appendChild(el('p','swipe','Swipe &rarr;'));
    i.appendChild(el('div','note','<b>The rule:</b> keep the weight until you hit the top of every set’s rep range, then add 2.5&nbsp;kg next time.'));
    return i;
  })());
  track.appendChild(intro);

  // ---- exercise slides ----
  EXERCISES.forEach(function(ex, idx){
    var s = el('section','slide');
    s.dataset.title = (idx+1)+". "+ex.name;
    var inner = el('div','inner');

    var head = el('div','ex-head');
    head.appendChild(el('span','ex-num',String(idx+1)));
    head.appendChild(el('h1',null,ex.name));
    head.appendChild(el('span','ex-sub',ex.sub));
    inner.appendChild(head);

    var demo = el('div','demo');
    ex.imgs.forEach(function(pair){
      var fig = el('figure');
      var img = el('img'); img.src=pair[0]; img.alt=ex.name+" – "+pair[1]; img.loading="lazy";
      fig.appendChild(img);
      fig.appendChild(el('figcaption',null,pair[1]));
      demo.appendChild(fig);
    });
    inner.appendChild(demo);

    var muscles = el('div','muscles');
    ex.muscles.forEach(function(m){ muscles.appendChild(el('span','pill',m)); });
    inner.appendChild(muscles);

    inner.appendChild(el('h2','sec','How to do it'));
    var ol = el('ol','steps');
    ex.steps.forEach(function(st){ ol.appendChild(el('li',null,st)); });
    inner.appendChild(ol);

    var cues = el('div','cues');
    cues.appendChild(el('h2','sec','Key cues'));
    var ul = el('ul');
    ex.cues.forEach(function(c){ ul.appendChild(el('li',null,c)); });
    cues.appendChild(ul);
    inner.appendChild(cues);

    var hm = el('div','howmuch');
    hm.appendChild(el('div','stat','<div class="k">Sets &times; Reps</div><div class="v">'+ex.how.sets+'<br><span style="font-size:12px;color:var(--muted);font-weight:600">'+ex.how.setsk+'</span></div>'));
    hm.appendChild(el('div','stat','<div class="k">Rest</div><div class="v">'+ex.how.rest+'</div>'));
    hm.appendChild(el('div','stat','<div class="k">Weight</div><div class="v" style="font-size:13.5px">'+ex.how.weight+'</div>'));
    inner.appendChild(hm);

    var pgCard = buildProgress(ex, PROGRESS[idx]);
    if(pgCard) inner.appendChild(pgCard);

    var a = el('a','watch','<span class="play">&#9654;</span> Watch proper form');
    a.href = ex.yt; a.target = "_blank"; a.rel = "noopener";
    inner.appendChild(a);

    s.appendChild(inner);
    track.appendChild(s);
  });

  // ---- finish slide ----
  var fin = el('section','slide');
  fin.dataset.title = "Done";
  fin.appendChild((function(){
    var i = el('div','inner center');
    i.appendChild(el('h1','big-title','Done.'));
    var box = el('div','addons');
    box.appendChild(el('div','note','<b>Optional 2-min add-ons</b> if you have time: lateral raises, overhead triceps extension, incline curls.'));
    box.appendChild(el('div','note','<b>First couple of weeks:</b> treat the split squat and ab wheel as practice &mdash; light, leave a few reps in the tank.'));
    i.appendChild(box);
    return i;
  })());
  track.appendChild(fin);

  // ---------- navigation ----------
  var slides = Array.prototype.slice.call(track.querySelectorAll('.slide'));
  var N = slides.length;
  var barTitle = document.getElementById('bar-title');
  var barCount = document.getElementById('bar-count');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var dotsWrap = document.getElementById('dots');
  var current = 0;

  var dots = slides.map(function(_, i){
    var b = document.createElement('button');
    b.setAttribute('aria-label','Go to slide '+(i+1));
    b.addEventListener('click', function(){ goTo(i); });
    dotsWrap.appendChild(b);
    return b;
  });

  function render(){
    barTitle.textContent = slides[current].dataset.title;
    barCount.innerHTML = (current+1)+'&thinsp;/&thinsp;'+N;
    dots.forEach(function(d,i){ d.classList.toggle('active', i===current); });
    prevBtn.disabled = current===0;
    nextBtn.disabled = current===N-1;
  }

  function goTo(i){
    i = Math.max(0, Math.min(N-1, i));
    track.scrollTo({left: i*track.clientWidth, behavior:'smooth'});
    // current updates via scroll handler, but set eagerly for snappy UI
    current = i; render();
  }

  // derive current slide from scroll position (handles native swipe)
  var ticking = false;
  track.addEventListener('scroll', function(){
    if(ticking) return;
    ticking = true;
    requestAnimationFrame(function(){
      var i = Math.round(track.scrollLeft / track.clientWidth);
      if(i !== current){ current = i; render(); }
      ticking = false;
    });
  }, {passive:true});

  prevBtn.addEventListener('click', function(){ goTo(current-1); });
  nextBtn.addEventListener('click', function(){ goTo(current+1); });

  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'){ goTo(current+1); }
    else if(e.key==='ArrowLeft'){ goTo(current-1); }
  });

  // keep alignment on rotate / resize
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){ track.scrollLeft = current*track.clientWidth; }, 120);
  });

  render();
})();
</script>
</body>
</html>
